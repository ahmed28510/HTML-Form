<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration Form</title>
</head>
<body>
    <div>
        <h1>User Registration Form</h1>
        
        <form id="registrationForm" method="POST" action="#">
            
            <!-- Field Set 1: Bio Data -->
            <fieldset>
                <legend>Bio Data</legend>
                
                <div>
                    <label for="name">Name <span>*</span></label>
                    <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                </div>
                
                <div>
                    <label for="password">Password <span>*</span></label>
                    <input type="password" id="password" name="password" placeholder="Enter password (5-10 characters)" required minlength="5" maxlength="10">
                </div>
                
                <div>
                    <label for="dob">Date of Birth <span>*</span></label>
                    <input type="date" id="dob" name="dob" required>
                </div>
                
                <div>
                    <label for="profilePic">Profile Picture</label>
                    <input type="file" id="profilePic" name="profilePic" accept="image/*">
                </div>
                
                <div>
                    <label>Gender</label>
                    <div>
                        <div>
                            <input type="radio" id="male" name="gender" value="Male">
                            <label for="male">Male</label>
                        </div>
                        <div>
                            <input type="radio" id="female" name="gender" value="Female">
                            <label for="female">Female</label>
                        </div>
                        <div>
                            <input type="radio" id="other" name="gender" value="Other">
                            <label for="other">Other</label>
                        </div>
                    </div>
                </div>
                
                <div>
                    <label for="nationality">Nationality</label>
                    <select id="nationality" name="nationality">
                        <option value="">-- Select Nationality --</option>
                        <option value="USA">USA</option>
                        <option value="UK">UK</option>
                        <option value="Canada">Canada</option>
                        <option value="India">India</option>
                        <option value="Australia">Australia</option>
                        <option value="Germany">Germany</option>
                        <option value="France">France</option>
                        <option value="Japan">Japan</option>
                        <option value="China">China</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                
                <div>
                    <label for="city">City</label>
                    <select id="city" name="city">
                        <option value="">-- Select City --</option>
                        <option value="New York">New York</option>
                        <option value="Los Angeles">Los Angeles</option>
                        <option value="Chicago">Chicago</option>
                        <option value="London">London</option>
                        <option value="Toronto">Toronto</option>
                        <option value="New Delhi">New Delhi</option>
                        <option value="Mumbai">Mumbai</option>
                        <option value="Sydney">Sydney</option>
                        <option value="Berlin">Berlin</option>
                        <option value="Paris">Paris</option>
                    </select>
                </div>
            </fieldset>
            
            <!-- Field Set 2: Professional Experience -->
            <fieldset>
                <legend>Professional Experience</legend>
                
                <div>
                    <label for="experience">Total Professional Experience (Years) <span>*</span></label>
                    <input type="number" id="experience" name="experience" placeholder="Minimum 5 years" min="5" required>
                </div>
                
                <div>
                    <label for="qualification">Qualification</label>
                    <select id="qualification" name="qualification">
                        <option value="">-- Select Qualification --</option>
                        <option value="High School">High School</option>
                        <option value="Bachelor's Degree">Bachelor's Degree</option>
                        <option value="Master's Degree">Master's Degree</option>
                        <option value="PhD">PhD</option>
                        <option value="Diploma">Diploma</option>
                        <option value="Certificate">Certificate</option>
                    </select>
                </div>
            </fieldset>
            
            <!-- Field Set 3: Other Details -->
            <fieldset>
                <legend>Other Details</legend>
                
                <div>
                    <label for="subjects">Favourite Subjects</label>
                    <select id="subjects" name="subjects" multiple>
                        <option value="Mathematics">Mathematics</option>
                        <option value="Science">Science</option>
                        <option value="English">English</option>
                        <option value="History">History</option>
                        <option value="Geography">Geography</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Physics">Physics</option>
                        <option value="Chemistry">Chemistry</option>
                        <option value="Biology">Biology</option>
                        <option value="Economics">Economics</option>
                    </select>
                </div>
            </fieldset>
            
            <!-- Submit and Reset Buttons -->
            <div>
                <button type="submit">Submit</button>
                <button type="reset">Reset</button>
            </div>
        </form>
    </div>
    
    <script>
        // Optional: Form submission handling
        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            // The form will automatically validate based on HTML5 attributes
            if (this.checkValidity() === false) {
                e.preventDefault();
                alert('Please fill in all required fields correctly.');
            } else {
                alert('Form submitted successfully!');
            }
        });
    </script>
</body>
</html>
